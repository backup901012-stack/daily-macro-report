name: 每日宏觀資訊報告（生成+發送）

on:
  schedule:
    # 台北時間 07:30 = UTC 23:30（前一天），週一到週五
    # 數據已於 05:00 收集+驗證完畢，07:30 準時送達信箱
    - cron: '30 23 * * 0-4'
  workflow_dispatch:

env:
  TZ: Asia/Taipei
  GMAIL_USER: ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  EMAIL_TO: ${{ secrets.EMAIL_TO }}

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo (with latest data)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance requests beautifulsoup4 numpy pandas weasyprint
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk chromium-browser || true

      - name: Verify data exists
        run: |
          echo "Checking data files..."
          for f in market_data_today.json news_today.json hot_stocks_today.json enhanced_today.json enhanced_v2_today.json; do
            if [ -f "reports/$f" ]; then
              SIZE=$(stat -c%s "reports/$f")
              echo "  ✓ $f ($SIZE bytes)"
            else
              echo "  ✗ $f MISSING"
            fi
          done
          # fred and alternative are optional
          for f in fred_today.json alternative_today.json; do
            if [ -f "reports/$f" ]; then
              SIZE=$(stat -c%s "reports/$f")
              echo "  ✓ $f ($SIZE bytes)"
            else
              echo "  ⚠ $f not found (optional)"
            fi
          done

      - name: Generate report
        run: python3 scripts/generate_full_report.py

      - name: Generate PDF
        run: |
          DATE=$(TZ='Asia/Taipei' date +%Y-%m-%d)
          HTML_FILE="reports/daily_report_${DATE}.html"
          PDF_FILE="reports/daily_report_${DATE}.pdf"
          if command -v chromium-browser &>/dev/null; then
            chromium-browser --headless --no-sandbox --disable-gpu \
              --print-to-pdf="${PDF_FILE}" --print-to-pdf-no-header \
              "file://$(pwd)/${HTML_FILE}" || true
          fi
          if [ ! -f "${PDF_FILE}" ] || [ $(stat -c%s "${PDF_FILE}" 2>/dev/null || echo 0) -lt 1000 ]; then
            python3 -c "
          from weasyprint import HTML
          HTML('${HTML_FILE}').write_pdf('${PDF_FILE}')
          print('PDF generated with WeasyPrint')
          "
          fi
          ls -la "${PDF_FILE}"

      - name: Send email (摘要正文 + PDF附件)
        run: |
          python3 -c "
          import smtplib, os, sys, json
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders
          from datetime import datetime

          sys.path.insert(0, '.')
          DATE = datetime.now().strftime('%Y-%m-%d')
          PDF_PATH = f'reports/daily_report_{DATE}.pdf'
          JSON_PATH = f'reports/raw_data_{DATE}.json'

          # 生成純文字摘要作為郵件正文（投行風格，不用 HTML 美工）
          from modules.email_sender import generate_email_summary

          plain_body = f'{DATE} 報告請見附件'
          if os.path.exists(JSON_PATH):
              try:
                  plain_body = generate_email_summary(JSON_PATH)
                  print('Email 純文字摘要已生成')
              except Exception as e:
                  print(f'生成摘要失敗: {e}')

          GMAIL_USER = os.environ.get('GMAIL_USER', 'backup901012@gmail.com')
          EMAIL_TO = os.environ.get('EMAIL_TO', 'cbe566@gmail.com').split(',')
          EMAIL_TO = [e.strip() for e in EMAIL_TO]

          # 讀取 PDF
          pdf_data = None
          if os.path.exists(PDF_PATH):
              with open(PDF_PATH, 'rb') as f:
                  pdf_data = f.read()
              print(f'PDF loaded: {len(pdf_data):,} bytes')

          # 逐一發送（收件人之間看不到彼此 — 隱私保護）
          server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
          server.login(GMAIL_USER, os.environ['GMAIL_APP_PASSWORD'])

          for recipient in EMAIL_TO:
              msg = MIMEMultipart('mixed')
              msg['From'] = GMAIL_USER
              msg['To'] = recipient
              msg['Subject'] = f'每日宏觀資訊綜合早報 | {DATE}'

              msg.attach(MIMEText(plain_body, 'plain', 'utf-8'))

              if pdf_data:
                  att = MIMEBase('application', 'pdf')
                  att.set_payload(pdf_data)
                  encoders.encode_base64(att)
                  att.add_header('Content-Disposition', 'attachment', filename=f'daily_report_{DATE}.pdf')
                  msg.attach(att)

              server.sendmail(GMAIL_USER, [recipient], msg.as_string())
              print(f'Sent to {recipient}')

          server.quit()
          now = datetime.now().strftime('%H:%M:%S')
          count = len(EMAIL_TO)
          print(f'All {count} emails sent at {now}')
          "
