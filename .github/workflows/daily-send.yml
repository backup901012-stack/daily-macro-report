name: 每日宏觀資訊報告（生成+發送）

on:
  # 數據收集完成後自動觸發（唯一正常路徑）
  workflow_run:
    workflows: ["每日宏觀資訊報告（數據收集）"]
    types: [completed]
  # 手動觸發（僅限緊急補發）
  workflow_dispatch:
    inputs:
      force_send:
        description: '強制發送（跳過防重發）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  TZ: Asia/Taipei

concurrency:
  group: daily-report-send
  cancel-in-progress: false

jobs:
  generate-and-send:
    # workflow_run 觸發時，只在數據收集成功後才執行
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout repo (with latest data)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance requests beautifulsoup4 numpy pandas deep-translator
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk chromium-browser || true

      - name: Verify data exists (必要數據缺失則中止)
        run: |
          echo "Checking data files..."
          MISSING=0
          for f in market_data_today.json news_today.json hot_stocks_today.json enhanced_today.json enhanced_v2_today.json; do
            if [ -f "reports/$f" ] && [ $(stat -c%s "reports/$f") -gt 100 ]; then
              SIZE=$(stat -c%s "reports/$f")
              echo "  ✓ $f ($SIZE bytes)"
            else
              echo "  ✗ $f MISSING or EMPTY"
              MISSING=$((MISSING+1))
            fi
          done
          for f in fred_today.json alternative_today.json; do
            if [ -f "reports/$f" ]; then
              SIZE=$(stat -c%s "reports/$f")
              echo "  ✓ $f ($SIZE bytes)"
            else
              echo "  ⚠ $f not found (optional)"
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "❌ $MISSING 個必要數據檔案缺失，中止發送"
            exit 1
          fi

      - name: Generate report
        env:
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        run: python3 scripts/generate_full_report.py

      - name: Generate PDF
        run: |
          DATE=$(TZ='Asia/Taipei' date +%Y-%m-%d)
          HTML_FILE="reports/daily_report_${DATE}.html"
          PDF_FILE="reports/daily_report_${DATE}.pdf"
          if command -v chromium-browser &>/dev/null; then
            chromium-browser --headless --no-sandbox --disable-gpu \
              --print-to-pdf="${PDF_FILE}" --print-to-pdf-no-header \
              "file://$(pwd)/${HTML_FILE}" || true
          fi
          if [ ! -f "${PDF_FILE}" ] || [ $(stat -c%s "${PDF_FILE}" 2>/dev/null || echo 0) -lt 1000 ]; then
            echo "❌ PDF 生成失敗"
            exit 1
          fi
          PDF_SIZE=$(stat -c%s "${PDF_FILE}")
          echo "✅ PDF: ${PDF_SIZE} bytes"
          if [ $PDF_SIZE -lt 100000 ]; then
            echo "❌ PDF 異常偏小 (< 100KB)，可能有問題"
            exit 1
          fi

      - name: Quality gate (品質閘門)
        run: |
          python3 -c "
          import json, sys
          DATE = __import__('datetime').datetime.now().strftime('%Y-%m-%d')
          with open(f'reports/raw_data_{DATE}.json') as f:
              data = json.load(f)
          news = data.get('news_events', [])
          if len(news) < 3:
              print('❌ 新聞不足 3 條')
              sys.exit(1)
          # 檢查新聞中文率
          zh_count = 0
          total = 0
          for n in news:
              for h in n.get('headlines', []):
                  total += 1
                  cjk = sum(1 for c in h if '\u4e00' <= c <= '\u9fff')
                  if cjk > len(h) * 0.3:
                      zh_count += 1
          rate = zh_count / total * 100 if total > 0 else 0
          print(f'新聞中文率: {zh_count}/{total} = {rate:.0f}%')
          if rate < 50:
              print('⚠️ 中文率偏低但繼續發送')
          print('✅ 品質閘門通過')
          "

      - name: 等待至台北 07:30 再發信
        run: |
          TARGET_H=7
          TARGET_M=30
          NOW=$(TZ='Asia/Taipei' date +%s)
          TARGET=$(TZ='Asia/Taipei' python3 -c "from datetime import datetime,timezone,timedelta;import time;tz=timezone(timedelta(hours=8));now=datetime.now(tz);t=now.replace(hour=${TARGET_H},minute=${TARGET_M},second=0,microsecond=0);print(int(t.timestamp()))")
          WAIT=$((TARGET - NOW))
          echo "⏰ NOW=$(TZ='Asia/Taipei' date '+%H:%M'), TARGET=07:30, WAIT=${WAIT}s"
          if [ "$WAIT" -gt 0 ] && [ "$WAIT" -lt 10800 ]; then
            echo "⏰ 距離台北 07:30 還有 ${WAIT} 秒（$(($WAIT/60))分鐘），等待中..."
            sleep "$WAIT"
            echo "⏰ 等待完成，現在是 $(TZ='Asia/Taipei' date '+%H:%M') 台北時間"
          else
            echo "⏰ 已過 07:30 或距離超過 3 小時，直接執行"
          fi

      - name: 防重發檢查（查 D1 是否今天已發）
        id: dedup
        run: |
          # 重試 3 次，全失敗預設「已發」（寧漏不重）
          SENT="true"
          for i in 1 2 3; do
            RESP=$(curl -s --max-time 10 "https://macro-report-monitor.stock-quant.workers.dev/status" 2>/dev/null)
            if [ $? -eq 0 ] && [ -n "$RESP" ]; then
              SENT=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('sent') and any(r.get('status')=='success' for r in d.get('records',[])) else 'false')" 2>/dev/null || echo "true")
              break
            fi
            echo "⚠️ D1 查詢第 $i 次失敗，重試..."
            sleep 3
          done
          echo "already_sent=$SENT" >> $GITHUB_OUTPUT
          if [ "$SENT" = "true" ]; then
            echo "⚠️ 今天已經發過信了（或查詢失敗預設已發），跳過發送"
          else
            echo "✅ 今天尚未發信，繼續"
          fi

      - name: Send email (Gmail OAuth2 API)
        if: steps.dedup.outputs.already_sent != 'true' || github.event.inputs.force_send == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          MONITOR_RECORD_KEY: ${{ secrets.MONITOR_RECORD_KEY }}
        run: |
          python3 -c "
          import os, sys, json, base64, requests
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.application import MIMEApplication
          from datetime import datetime

          sys.path.insert(0, '.')
          DATE = datetime.now().strftime('%Y-%m-%d')
          PDF_PATH = f'reports/daily_report_{DATE}.pdf'
          JSON_PATH = f'reports/raw_data_{DATE}.json'

          # 生成純文字摘要
          from modules.email_sender import generate_email_summary
          plain_body = f'{DATE} 報告請見附件'
          if os.path.exists(JSON_PATH):
              try:
                  plain_body = generate_email_summary(JSON_PATH)
                  print('✅ Email 摘要已生成')
              except Exception as e:
                  print(f'⚠️ 摘要生成失敗: {e}')

          # OAuth2 取得 access_token
          gmail_user = os.environ.get('GMAIL_USER')
          client_id = os.environ.get('GMAIL_CLIENT_ID')
          client_secret = os.environ.get('GMAIL_CLIENT_SECRET')
          refresh_token = os.environ.get('GMAIL_REFRESH_TOKEN')
          email_to = os.environ.get('EMAIL_TO', '').split(',')
          email_to = [e.strip() for e in email_to if e.strip()]

          if not all([gmail_user, client_id, client_secret, refresh_token]):
              print('❌ Gmail OAuth2 憑證未設定')
              sys.exit(1)

          token_resp = requests.post('https://oauth2.googleapis.com/token', data={
              'client_id': client_id,
              'client_secret': client_secret,
              'refresh_token': refresh_token,
              'grant_type': 'refresh_token',
          })
          if token_resp.status_code != 200:
              print(f'❌ OAuth2 token 刷新失敗: {token_resp.text[:200]}')
              sys.exit(1)

          access_token = token_resp.json()['access_token']
          print('✅ OAuth2 token 取得成功')

          # 讀取 PDF
          pdf_data = None
          if os.path.exists(PDF_PATH):
              with open(PDF_PATH, 'rb') as f:
                  pdf_data = f.read()
              print(f'✅ PDF: {len(pdf_data):,} bytes')

          # 逐一發送（隱私保護）
          success = 0
          sent_recipients = []
          for recipient in email_to:
              msg = MIMEMultipart('mixed')
              msg['From'] = f'何宣逸 <{gmail_user}>'
              msg['To'] = recipient
              msg['Subject'] = f'每日宏觀資訊綜合早報 | {DATE}'

              msg.attach(MIMEText(plain_body, 'plain', 'utf-8'))

              if pdf_data:
                  att = MIMEApplication(pdf_data, _subtype='pdf')
                  att.add_header('Content-Disposition', 'attachment', filename=f'daily_report_{DATE}.pdf')
                  msg.attach(att)

              raw = base64.urlsafe_b64encode(msg.as_bytes()).decode()
              send_resp = requests.post(
                  'https://gmail.googleapis.com/gmail/v1/users/me/messages/send',
                  headers={'Authorization': f'Bearer {access_token}', 'Content-Type': 'application/json'},
                  json={'raw': raw},
                  timeout=30,
              )
              if send_resp.status_code == 200:
                  print(f'✅ Sent to {recipient}')
                  success += 1
                  sent_recipients.append(recipient)
              else:
                  print(f'❌ Failed {recipient}: {send_resp.text[:100]}')

          now = datetime.now().strftime('%H:%M:%S')
          print(f'📧 {success}/{len(email_to)} emails sent at {now}')
          if success == 0:
              sys.exit(1)

          # 記錄發送結果到 Cloudflare D1（透過 Worker）
          record_key = os.environ.get('MONITOR_RECORD_KEY', '')
          if record_key and success > 0:
              try:
                  record_resp = requests.post(
                      'https://macro-report-monitor.stock-quant.workers.dev/record',
                      headers={'X-API-Key': record_key, 'Content-Type': 'application/json'},
                      json={'date': DATE, 'recipients': sent_recipients, 'pdf_size': len(pdf_data) if pdf_data else 0},
                      timeout=10,
                  )
                  if record_resp.status_code == 200:
                      print(f'✅ D1 記錄成功: {record_resp.json()}')
                  else:
                      print(f'⚠️ D1 記錄失敗: {record_resp.text[:100]}')
              except Exception as e:
                  print(f'⚠️ D1 記錄異常: {e}')
          "
